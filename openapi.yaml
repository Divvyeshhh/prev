openapi: 3.0.3

info:
  title: Book API
  version: 1.0.0
  description: Sample Book Management API

servers:
  - url: https://api.example.com

paths:
  /books:
    get:
      summary: Get all books
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
        - name: size
          in: query
          required: false
          schema:
            type: integer
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of books
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookListResponse"

    post:
      summary: Create a new book
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookRequest"

      responses:
        "201":
          description: Book created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

  /books/{bookId}:
    get:
      summary: Get book by ID

      parameters:
        - name: bookId
          in: path
          required: true
          schema:
            type: string

        - name: Authorization
          in: header
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Book details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"

        "404":
          description: Book not found

components:
  schemas:

    CreateBookRequest:
      type: object
      required:
        - title
        - author

      properties:
        title:
          type: string

        author:
          type: string

        pages:
          type: integer

    Book:
      type: object

      properties:
        id:
          type: string

        title:
          type: string

        author:
          type: string

        pages:
          type: integer

    BookListResponse:
      type: object

      properties:
        books:
          type: array

          items:
            $ref: "#/components/schemas/Book"